name: "Terraform CI/CD — Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:   # Дозволяє запускати вручну з GitHub UI

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Validate + Plan (перевірка без розгортання)
  # ──────────────────────────────────────────────────
  terraform-validate-and-plan:
    name: "🔍 Validate & Plan"
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # Автентифікація в GCP через Service Account JSON зі Secrets
      - name: "🔐 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "📦 Terraform Init"
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: "✅ Terraform Format Check"
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: "🔎 Terraform Validate"
        run: terraform validate

      # Plan — перевірка без реального розгортання
      # Якщо plan падає — pipeline зупиняється (exit code != 0)
      - name: "📋 Terraform Plan"
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="last_name=${{ vars.LAST_NAME }}" \
            -detailed-exitcode \
            -out=tfplan
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      # Збереження плану як артефакту для наступного job
      - name: "💾 Upload Terraform Plan"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

      # Коментар до Pull Request з результатами plan
      - name: "💬 Comment Plan on PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`${{ steps.plan.outcome }}\`
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ──────────────────────────────────────────────────
  # JOB 2: Apply (реальне розгортання — тільки main)
  # ──────────────────────────────────────────────────
  terraform-apply:
    name: "🚀 Apply Infrastructure"
    runs-on: ubuntu-latest
    needs: terraform-validate-and-plan   # Запускається тільки якщо plan успішний
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🔐 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "📦 Terraform Init"
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      # Завантаження плану з попереднього job
      - name: "📥 Download Terraform Plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: "🚀 Terraform Apply"
        run: terraform apply -auto-approve tfplan
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: "📊 Show Outputs"
        run: terraform output
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
