name: "Terraform CI/CD — Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Validate + Plan (перевірка БЕЗ розгортання)
  # ──────────────────────────────────────────────────
  terraform-validate-and-plan:
    name: "🔍 Validate & Plan"
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "📦 Terraform Init"
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: "✅ Terraform Format Check"
        run: terraform fmt -check -recursive

      - name: "🔎 Terraform Validate"
        run: terraform validate

      # Plan — перевірка без реального розгортання
      # Якщо plan падає — pipeline зупиняється
      - name: "📋 Terraform Plan"
        id: plan
        run: |
          terraform plan \
            -var="do_token=${{ secrets.DO_TOKEN }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="spaces_access_id=${{ secrets.SPACES_ACCESS_ID }}" \
            -var="spaces_secret_key=${{ secrets.SPACES_SECRET_KEY }}" \
            -var="last_name=${{ vars.LAST_NAME }}" \
            -out=tfplan
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: "💾 Upload Terraform Plan"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  # ──────────────────────────────────────────────────
  # JOB 2: Apply (реальне розгортання — тільки main)
  # ──────────────────────────────────────────────────
  terraform-apply:
    name: "🚀 Apply Infrastructure"
    runs-on: ubuntu-latest
    needs: terraform-validate-and-plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "📦 Terraform Init"
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: "📥 Download Terraform Plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: "🚀 Terraform Apply"
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: "📊 Show Outputs"
        run: terraform output
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
