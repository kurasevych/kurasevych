name: "Terraform CI/CD — Destroy (Bonus)"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Введіть "destroy" для підтвердження знищення всіх ресурсів'
        required: true
        default: ""

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"

jobs:
  terraform-destroy:
    name: "💣 Destroy All Infrastructure"
    runs-on: ubuntu-latest
    environment: production

    if: github.event.inputs.confirm_destroy == 'destroy'

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: "🛑 Safety Check"
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
            echo "❌ Знищення скасовано."
            exit 1
          fi
          echo "⚠️ Починаємо знищення ресурсів..."

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "📦 Terraform Init"
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: "💣 Terraform Destroy"
        run: |
          terraform destroy \
            -var="do_token=${{ secrets.DO_TOKEN }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="spaces_access_id=${{ secrets.SPACES_ACCESS_ID }}" \
            -var="spaces_secret_key=${{ secrets.SPACES_SECRET_KEY }}" \
            -var="last_name=${{ vars.LAST_NAME }}" \
            -auto-approve
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: "✅ Done"
        run: echo "✅ Всі ресурси знищені."
