name: "Terraform CI/CD — Destroy (Bonus)"

# Цей pipeline знищує всі ресурси.
# Запускається ТІЛЬКИ вручну для безпеки.
on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Введіть "destroy" для підтвердження знищення всіх ресурсів'
        required: true
        default: ""

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"

jobs:
  terraform-destroy:
    name: "💣 Destroy All Infrastructure"
    runs-on: ubuntu-latest
    environment: production

    # Подвійна перевірка підтвердження
    if: github.event.inputs.confirm_destroy == 'destroy'

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: "🛑 Safety Check"
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
            echo "❌ Знищення скасовано. Введіть 'destroy' для підтвердження."
            exit 1
          fi
          echo "⚠️  Підтвердження отримано. Починаємо знищення ресурсів..."

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🔐 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "📦 Terraform Init"
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: "💣 Terraform Destroy"
        run: |
          terraform destroy \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="last_name=${{ vars.LAST_NAME }}" \
            -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: "✅ Destroy Complete"
        run: echo "✅ Всі ресурси успішно знищені."
