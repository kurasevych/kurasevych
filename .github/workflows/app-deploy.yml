name: "Task 3: Build and Deploy App"

on:
  workflow_run:
    workflows: ["Cloud Deployment CI/CD"] # Запускати після того, як створиться інфраструктура
    types: [completed]
  push:
    branches: [ main ] # Або ручний запуск

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App Code
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2' # Репозиторій з кодом застосунку

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Збірка для DEV (гілка develop)
      - name: Build and Push DEV
        run: |
          git checkout develop
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:develop .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:develop

      # Збірка для RELEASE (тег 1.0.0)
      - name: Build and Push RELEASE
        run: |
          git checkout 1.0.0
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:1.0.0 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:1.0.0
