name: "DevOps Exam: Full Pipeline"

on:
  push:
    branches: [ main ]

jobs:
  # КРОК 1: Збірка та Пуш образів (Завдання 3)
  build-docker:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    # Додаємо секрети в оточення всього Job, щоб вони точно були доступні
    env:
      DOCKER_USER: ${{ secrets.DOCKERHUB_KURASEVYCH }}
      DOCKER_PASS: ${{ secrets.DOCKERHUB_KEY }}
    steps:
      - name: Checkout App Code (External Repository)
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          fetch-depth: 0 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - name: Build & Push Develop (DEV)
        run: |
          git checkout develop
          docker build -t kurasevych/devops-app:develop .
          docker push kurasevych/devops-app:develop

      - name: Build & Push 1.0.0 (RELEASE)
        run: |
          git checkout 1.0.0
          docker build -t kurasevych/devops-app:1.0.0 .
          docker push kurasevych/devops-app:1.0.0

  # КРОК 2: Інфраструктура (Завдання 1)
  terraform:
    name: "Infrastructure (Terraform)"
    needs: build-docker
    runs-on: ubuntu-latest
    outputs:
      target_ip: ${{ steps.out.outputs.ip }}
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: TF Init
        run: terraform init -reconfigure -backend-config="access_key=${{ secrets.SPACES_ACCESS_ID }}" -backend-config="secret_key=${{ secrets.SPACES_SECRET_KEY }}"
        working-directory: ./terraform

      - name: TF Apply
        run: >
          terraform apply -auto-approve 
          -var="do_token=${{ secrets.DO_TOKEN }}" 
          -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" 
          -var="spaces_access_id=${{ secrets.SPACES_ACCESS_ID }}" 
          -var="spaces_secret_key=${{ secrets.SPACES_SECRET_KEY }}"
        working-directory: ./terraform

      - name: Export IP
        id: out
        run: echo "ip=$(terraform output -raw droplet_ip)" >> $GITHUB_OUTPUT
        working-directory: ./terraform

  # КРОК 3: Встановлення та Деплой (Завдання 2 та 3)
  ansible:
    name: "Software & Deploy (Ansible)"
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          sleep 30
          ssh-keyscan -H ${{ needs.terraform.outputs.target_ip }} >> ~/.ssh/known_hosts

      - name: Ansible Install & App Deploy
        run: |
          ansible-playbook -i '${{ needs.terraform.outputs.target_ip }},' -u root --private-key ~/.ssh/id_rsa ansible/playbook.yml

      - name: Setup Minikube Proxy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ needs.terraform.outputs.target_ip }} "kubectl proxy --address='0.0.0.0' --accept-hosts='.*' > /dev/null 2>&1 &"
