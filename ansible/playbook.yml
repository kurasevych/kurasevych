---
- name: Setup Kubernetes, Minikube and Deploy App (Task 2 & 3)
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    # --- СЕКЦІЯ 1: ПІДГОТОВКА СИСТЕМИ (Завдання 2) ---
    - name: Update apt cache and install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
          - conntrack
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Ensure root is in docker group
      user:
        name: root
        groups: docker
        append: yes

    - name: Install kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Start Minikube as root (Force Docker driver)
      command: minikube start --driver=docker --force
      register: minikube_start
      changed_when: "'Done!' in minikube_start.stdout"

    - name: Wait for Minikube to be ready
      command: kubectl get nodes
      register: nodes_ready
      retries: 15
      delay: 20
      until: nodes_ready.rc == 0

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    # --- СЕКЦІЯ 2: РОЗГОРТАННЯ ЗАСТОСУНКУ (Завдання 3) ---
    - name: Create app deployment manifest on server
      copy:
        dest: /root/app-deploy.yaml
        content: |
          # --- DEV Environment ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: dev
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: app-dev
            namespace: dev
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: devops-app
            template:
              metadata:
                labels:
                  app: devops-app
              spec:
                containers:
                - name: web-app
                  image: kurasevych/devops-app:develop
                  ports:
                  - containerPort: 8080
          ---
          # --- RELEASE Environment ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: release
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: app-release
            namespace: release
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: devops-app
            template:
              metadata:
                labels:
                  app: devops-app
              spec:
                containers:
                - name: web-app
                  image: kurasevych/devops-app:1.0.0
                  ports:
                  - containerPort: 8080

    - name: Deploy Application to K8s
      command: kubectl apply -f /root/app-deploy.yaml

    - name: Wait for Pods to be Running
      shell: "kubectl get pods -A | grep -E 'dev|release' | grep 'Running'"
      register: pods_check
      retries: 20
      delay: 15
      until: pods_check.rc == 0

    - name: Kill existing port-forwards
      shell: "pkill kubectl || true"

    - name: Port-forward DEV (8002:8080)
      shell: "nohup kubectl port-forward --namespace dev deployment/app-dev 8002:8080 --address 0.0.0.0 > /dev/null 2>&1 &"

    - name: Port-forward RELEASE (8003:8080)
      shell: "nohup kubectl port-forward --namespace release deployment/app-release 8003:8080 --address 0.0.0.0 > /dev/null 2>&1 &"

    - name: Check ports are listening
      wait_for:
        port: "{{ item }}"
        delay: 5
        timeout: 60
      with_items:
        - 8002
        - 8003
